<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 450px;
            min-height: 300px;
            background: linear-gradient(135deg, #0F111A 0%, #1A1F2E 100%);
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 0;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #FFFFFF;
            background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input,
        select,
        textarea {
            background: #161B22;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            color: #E0E0E0;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #A78BFA;
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            max-height: 100px;
        }

        .url-display {
            background: #0D1117;
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #888;
            word-break: break-all;
            max-height: 40px;
            overflow: hidden;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save {
            background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #E0E0E0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 2px solid rgba(167, 139, 250, 0.2);
            border-top: 2px solid #A78BFA;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22C55E;
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444;
            display: block;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: #161B22;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            min-height: 40px;
        }

        .tag {
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #A78BFA;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag button {
            background: none;
            border: none;
            color: #A78BFA;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }

        .tag-input-field {
            background: transparent;
            border: none;
            color: #E0E0E0;
            font-size: 13px;
            flex: 1;
            min-width: 80px;
        }

        .tag-input-field:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Ethereal AI Save</h1>
        </div>

        <div id="message" class="message"></div>

        <div id="form">
            <div class="form-group">
                <label>URL</label>
                <div class="url-display" id="urlDisplay">Loading...</div>
            </div>

            <div class="form-group">
                <label>Title (Optional)</label>
                <input type="text" id="title" placeholder="Enter a title for this item...">
            </div>

            <div class="form-group">
                <label>Type</label>
                <select id="type">
                    <option value="">Select Type</option>
                    <option value="Article">Article</option>
                    <option value="Video">Video</option>
                    <option value="Tweet">Tweet</option>
                    <option value="Image">Image</option>
                    <option value="Pdf">PDF</option>
                </select>
            </div>

            <div class="form-group">
                <label>Notes (Optional)</label>
                <textarea id="notes" placeholder="Add your thoughts or summary..."></textarea>
            </div>

            <div class="form-group">
                <label>Tags (Optional)</label>
                <div class="tags-input" id="tagsContainer">
                    <input type="text" class="tag-input-field" id="tagInput" placeholder="Type and press Enter...">
                </div>
            </div>

            <div class="form-group">
                <label>Mode</label>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <label style="font-size:12px;color:#ccc;"><input type="radio" name="saveMode" value="link" checked> Save Link</label>
                    <label style="font-size:12px;color:#ccc;"><input type="radio" name="saveMode" value="screenshot"> Save Screenshot</label>
                    <label style="font-size:12px;color:#ccc;"><input type="radio" name="saveMode" value="both"> Save Both</label>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-cancel" id="cancelBtn">Cancel</button>
                <button class="btn-save" id="screenshotBtn">📸 Screenshot</button>
                <button class="btn-save" id="saveBtn">Save Item</button>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Saving to Ethereal AI...</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
